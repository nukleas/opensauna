<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9f1c"/>
      <stop offset="100%" style="stop-color:#e63946"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1c1c1e"/>

  <!-- Calendar/booking card shape -->
  <rect x="96" y="120" width="320" height="300" rx="24" fill="#2c2c2e"/>

  <!-- Calendar top bar -->
  <rect x="96" y="120" width="320" height="60" rx="24" fill="url(#orangeGrad)"/>
  <rect x="96" y="156" width="320" height="24" fill="url(#orangeGrad)"/>

  <!-- Calendar binding holes -->
  <circle cx="160" cy="100" r="16" fill="#2c2c2e" stroke="#ff9f1c" stroke-width="8"/>
  <circle cx="256" cy="100" r="16" fill="#2c2c2e" stroke="#ff9f1c" stroke-width="8"/>
  <circle cx="352" cy="100" r="16" fill="#2c2c2e" stroke="#ff9f1c" stroke-width="8"/>

  <!-- Heat waves / lines on calendar -->
  <path d="M160 240 Q180 220 200 240 Q220 260 240 240" stroke="#ff9f1c" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M272 240 Q292 220 312 240 Q332 260 352 240" stroke="#ff9f1c" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M160 300 Q180 280 200 300 Q220 320 240 300" stroke="#e63946" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M272 300 Q292 280 312 300 Q332 320 352 300" stroke="#e63946" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M216 360 Q236 340 256 360 Q276 380 296 360" stroke="#ff6b35" stroke-width="12" fill="none" stroke-linecap="round"/>
</svg>
