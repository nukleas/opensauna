<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1f1a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#ff8c42"/>
      <stop offset="100%" style="stop-color:#ffb347"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Stylized B made of flames -->
  <path d="M160 400 L160 112
           M160 112 Q160 80 200 80 L280 80 Q360 80 360 140 Q360 200 300 210
           Q380 220 380 290 Q380 380 300 400 L200 400 Q160 400 160 368
           M160 256 L280 256 Q320 256 320 210 Q320 160 280 160 L200 160
           M160 320 L280 320 Q340 320 340 290 Q340 256 280 256"
        fill="none" stroke="url(#flame)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
