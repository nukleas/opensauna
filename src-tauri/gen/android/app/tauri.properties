# Android version seed for local builds. CI overwrites this per-build:
# versionName from the release tag, versionCode from the monotonic run number
# (Android refuses any in-place update whose versionCode is not strictly
# greater). Keep these in sync with src-tauri/tauri.conf.json on release bumps.
tauri.android.versionName=0.4.0
tauri.android.versionCode=1
