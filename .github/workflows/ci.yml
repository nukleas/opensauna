name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run workspace tests
        run: cargo test --workspace --verbose

  build-desktop:
    name: Build (desktop)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tauri-

      - name: Install Trunk
        run: cargo install trunk --locked || true

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked || true

      # ── Code signing (so release artifacts actually "run right") ───────
      # macOS: import the Developer ID cert into a temp keychain so Tauri can
      # sign + notarize. Gated like the Android job — required on a tag,
      # warn off-tag. Windows is intentionally shipped UNSIGNED (SmartScreen
      # shows a one-click "More info → Run anyway"); see docs/SIGNING.md.
      - name: Import Apple Developer ID certificate (macOS)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              echo "::error::APPLE_CERTIFICATE is not set — cannot sign/notarize the macOS release for $GITHUB_REF_NAME. See docs/SIGNING.md."
              exit 1
            fi
            echo "::warning::No Apple certificate — building an ad-hoc macOS app. Gatekeeper will block it for anyone who downloads it."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$APPLE_CERTIFICATE_PASSWORD"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          # Import the whole .p12 (cert + private key). Importing keys too,
          # not just -t cert, so a Developer ID *identity* lands in the chain.
          if ! security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_CERTIFICATE_PASSWORD" \
                 -A -f pkcs12 -k "$KEYCHAIN_PATH"; then
            echo "::error::Could not import the .p12 — wrong APPLE_CERTIFICATE_PASSWORD, or the file isn't a valid PKCS#12 export."
            exit 1
          fi
          # Non-fatal: only relevant once a private key is present.
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH" >/dev/null 2>&1 || true
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          # Discover the actual identity inside the imported cert instead of
          # trusting a hand-set string (which caused "no identity found").
          echo "Identities in imported keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          SIGN_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | head -1)
          if [ -z "$SIGN_ID" ]; then
            echo "::error::No usable 'Developer ID Application' signing identity in the .p12. Most likely the export included the certificate but NOT its private key — in Keychain Access, expand the cert, select BOTH the certificate and the key under it, and 'Export 2 items' as .p12."
            exit 1
          fi
          echo "Signing with: $SIGN_ID"
          echo "APPLE_SIGNING_IDENTITY=$SIGN_ID" >> "$GITHUB_ENV"
          echo "MACOS_SIGN=1" >> "$GITHUB_ENV"

      - name: Build Tauri bundle
        env:
          # APPLE_SIGNING_IDENTITY is exported to $GITHUB_ENV by the import
          # step above (auto-detected from the cert). Tauri auto-notarizes
          # when the APPLE_ID trio is present and the bundle is Developer ID
          # signed. On Linux/Windows these are empty and ignored.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: cargo tauri build

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: opensauna-${{ matrix.os }}
          path: |
            target/release/bundle/macos/*.app
            target/release/bundle/dmg/*.dmg
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
          if-no-files-found: warn

  build-android:
    name: Build (Android)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # All four Android ABIs so we can emit a single universal APK/AAB.
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      # ── Signing ───────────────────────────────────────────────────────
      # gradle (build.gradle.kts) enables release signing only when
      # $RUNNER_TEMP/keystore.properties exists, so we write it ONLY when the
      # secret is present. On a tag we require it (a release must be signed);
      # off-tag we warn and produce an unsigned build for verification.
      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              echo "::error::ANDROID_KEYSTORE_BASE64 is not set — cannot produce a signed release for $GITHUB_REF_NAME. Add the signing secrets (see CONTRIBUTING.md)."
              exit 1
            fi
            echo "::warning::No keystore secret set — building an UNSIGNED Android APK (fine for CI verification, not installable as an update)."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore.jks"
          cat > "$RUNNER_TEMP/keystore.properties" <<EOF
          storeFile=$RUNNER_TEMP/keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}
          EOF
          sed -i 's/^[[:space:]]*//' "$RUNNER_TEMP/keystore.properties"

      # versionCode MUST strictly increase or Android refuses the in-place
      # update; the monotonic run number guarantees it. versionName comes from
      # the tag (vX.Y.Z -> X.Y.Z), or a -dev marker off-tag.
      - name: Set Android version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev+${GITHUB_SHA::7}"
          fi
          cat > src-tauri/gen/android/app/tauri.properties <<EOF
          tauri.android.versionName=$VERSION
          tauri.android.versionCode=$GITHUB_RUN_NUMBER
          EOF
          echo "Android version: $VERSION (code $GITHUB_RUN_NUMBER)"

      # ── Build ─────────────────────────────────────────────────────────
      - name: Install Trunk
        run: cargo install trunk --locked || true

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked || true

      - name: Set NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      # No --target => build every installed ABI into ONE universal artifact
      # (app-universal-release.apk) so Obtainium has a single predictable asset.
      - name: Build Tauri Android (universal APK + AAB)
        run: cargo tauri android build --apk --aab --ci

      # ── Upload Artifacts ──────────────────────────────────────────────
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opensauna-android
          path: |
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-desktop, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List release artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-alpha') }}
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.dmg
            artifacts/**/*.app
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
